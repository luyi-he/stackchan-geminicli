name: Publish gateway to PyPI

on:
  push:
    tags:
      - "v*"
  # Allow maintainers to manually run the build/test pipeline without
  # cutting a tag — useful for verifying the workflow itself or
  # dry-running a CI change. The publish job is skipped when the
  # workflow is invoked this way, so this cannot accidentally release.
  workflow_dispatch:

# Default permissions: nothing. Each job opts in to what it needs.
permissions: {}

# Only one publish run at a time per tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so the "is this tag on main?" check below
          # can resolve origin/main.
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag commit is on origin/main
        # Tag-only check. workflow_dispatch dry-runs skip this so they
        # can validate the build/test pipeline from any branch.
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag commit $GITHUB_SHA is not an ancestor of origin/main."
            echo "Refusing to publish from a non-main commit."
            echo "Release tags must point at a commit that has been reviewed and merged into main."
            exit 1
          fi
          echo "Tag commit verified to be on origin/main."

      - name: Set up uv
        # `astral-sh/setup-uv` ships immutable releases starting with
        # v8 — no `@v8` alias exists, so a full version pin is required.
        # See CONTRIBUTING.md "Pinning policy for the publish workflow".
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag matches gateway/pyproject.toml version (PEP 440)
        # Tag-only check. workflow_dispatch dry-runs skip this since
        # there is no tag to compare against.
        if: github.event_name == 'push'
        working-directory: gateway
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release tags must start with 'v' (got: $GITHUB_REF)"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          PYPROJECT_VERSION=$(python3 -c "import tomllib, sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")

          # Use packaging.version.Version for PEP 440 normalization, so that
          # tags like v0.1.0-rc.1 / 0.1.0rc1 / 0.1.0a1 compare correctly
          # against the version recorded in pyproject.toml.
          python3 -m pip install --quiet --user "packaging>=24"

          NORMALIZED_TAG=$(python3 -c "from packaging.version import Version; print(Version('$TAG_VERSION'))")
          NORMALIZED_PROJECT=$(python3 -c "from packaging.version import Version; print(Version('$PYPROJECT_VERSION'))")
          echo "Tag (raw -> normalized):       $TAG_VERSION -> $NORMALIZED_TAG"
          echo "Pyproject (raw -> normalized): $PYPROJECT_VERSION -> $NORMALIZED_PROJECT"
          if [ "$NORMALIZED_TAG" != "$NORMALIZED_PROJECT" ]; then
            echo "::error::Tag $TAG_VERSION does not match gateway/pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

          # Reject local versions (e.g. 1.0+local) for public releases.
          # Pre-release tags (rc / a / b) are intentionally allowed.
          python3 - <<PY
          from packaging.version import Version
          v = Version("$NORMALIZED_TAG")
          if v.local is not None:
              raise SystemExit("::error::Local versions (e.g. 1.0+local) are not allowed for public releases")
          print("Version policy: OK (pre-release allowed; local version rejected)")
          PY

      - name: Verify gateway/uv.lock is in sync with gateway/pyproject.toml
        # Catches the failure mode that motivated this step: a release
        # bump to gateway/pyproject.toml without re-running `uv lock`,
        # leaving uv.lock pinned at the previous version. `uv sync
        # --frozen` reads the lock as-is and does not detect this
        # drift; `uv lock --check` re-resolves and exits non-zero on
        # any mismatch, blocking the publish job before it produces a
        # divergent sdist / wheel.
        working-directory: gateway
        run: uv lock --check

      - name: Verify CHANGELOG.md has dated section for this tag
        # Mirrors the firmware-release.yml CHANGELOG gate: refuse to
        # publish a release tag that does not have a matching dated
        # `## [X.Y.Z] - YYYY-MM-DD` section in CHANGELOG.md, so the
        # promotion of `[Unreleased]` entries into a dated section is
        # enforced rather than documented-only. The `changelog-check`
        # gate in build.yml skips on `release:`-titled PRs (release
        # promotion intentionally leaves [Unreleased] body unchanged
        # between base and head); this tag-time gate is the
        # authoritative floor for gateway releases, paired with the
        # equivalent gate in firmware-release.yml.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"   # e.g. v0.9.1
          VERSION="${TAG#v}"          # e.g. 0.9.1
          # Escape `.` for regex so a malformed heading like
          # `## [0x9x1] - 2026-06-08` does not falsely match the
          # dotted version on a naive grep.
          VERSION_ESC=$(printf '%s' "$VERSION" | sed -E 's/\./\\./g')
          # Match `## [<VERSION>] - YYYY-MM-DD` exactly (anchored line,
          # no leading or trailing garbage). Require exactly one
          # occurrence; zero is missing-section, more than one means
          # a duplicate / botched promotion.
          COUNT=$(grep -cE "^## \[${VERSION_ESC}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}\$" CHANGELOG.md || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error title=Missing CHANGELOG section for ${TAG}::CHANGELOG.md does not contain a dated section for this tag. Expected an exact heading like: ## [${VERSION}] - YYYY-MM-DD"
            echo "Add the section to CHANGELOG.md (promote the [Unreleased] entries into a new dated section) before pushing the tag."
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error title=Duplicate CHANGELOG section for ${TAG}::CHANGELOG.md has ${COUNT} dated sections for ${TAG}, expected exactly 1. Consolidate the duplicates before publishing."
            exit 1
          fi
          echo "CHANGELOG entry for ${TAG} verified (exactly 1 dated section)."

      - name: Install gateway dependencies
        working-directory: gateway
        run: uv sync --frozen

      - name: Run ruff
        working-directory: gateway
        run: uv run ruff check .

      - name: Run pytest
        working-directory: gateway
        run: uv run pytest

      - name: Build distributions (sdist + py3-none-any wheel)
        # The Ubuntu runner does not place `opus.dll` under
        # `stackchan_mcp/_libs/`, so this build produces a sdist plus a
        # `py3-none-any` wheel that ships with `SOURCES.md` but
        # without the native binary. The Windows-only wheel is built
        # by `build-windows-wheel` below.
        working-directory: gateway
        run: uv build

      - name: List built artifacts
        working-directory: gateway
        run: ls -la dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-linux
          path: gateway/dist/
          retention-days: 7

  build-windows-wheel:
    name: Build win_amd64 wheel
    needs: build
    # Restored in v0.9.1 after the v0.9.0 hotfix (#274) temporarily
    # disabled this job. The byte-identical SHA256 guard against a
    # pinned EXPECTED_OPUS_DLL_SHA256 was retired here because the
    # current windows-latest runner image produces non-deterministic
    # opus.dll across builds (windows-latest → windows-2025-vs2026
    # transition; MSVC under the new image embeds non-deterministic
    # build info). The functional smoke test in the publish job below
    # (`Smoke test bundled opus loader`, which loads opus.dll via
    # opuslib and runs an Opus encode round-trip) is now the publish
    # gate. The VCPKG_PIN below still locks the supply chain to a
    # reviewed vcpkg release tag.
    #
    # The Windows wheel only differs from the Ubuntu build by the
    # bundled `opus.dll`, but it must be built on a Windows runner so
    # vcpkg can produce a binary that matches the runtime ABI users
    # will install onto. The job is gated on the Ubuntu build passing
    # so lint / pytest failures stop the pipeline before this much
    # slower runner spins up.
    runs-on: windows-latest

    permissions:
      contents: read

    env:
      # Pinned vcpkg release tag. Both the Opus port script and the
      # underlying source tarball SHA come from this tag, so the
      # supply-chain story for the bundled opus.dll is reproducible
      # from CI history alone — independent of master drift or
      # runner-image rev. Bump only after reviewing vcpkg's Opus port
      # for security-relevant changes between tags.
      # https://github.com/microsoft/vcpkg/releases
      # Pinned to 2026.04.27 → Opus 1.5.2 port-version 1.
      VCPKG_PIN: "2026.04.27"
      # NOTE: The previous EXPECTED_OPUS_DLL_SHA256 byte-identical
      # guard was retired in v0.9.1 (see the job-level comment above).
      # The functional smoke test in the publish job is now the
      # publish gate; the freshly produced opus.dll must load via
      # opuslib and pass an Opus encode round-trip on a real Windows
      # runner before the wheel can ship. If deterministic builds
      # are restored upstream (vcpkg + windows runner image), the
      # SHA pin can be reintroduced as an additional reproducibility
      # signal alongside the functional test, not as the sole gate.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Pin vcpkg to a reviewed release tag rather than HEAD of
      # master. This locks both the Opus port script and the
      # source tarball it pulls so the bundled DLL is reviewable
      # supply chain — see the VCPKG_PIN comment above.
      - name: Bootstrap vcpkg (pinned)
        shell: pwsh
        run: |
          if (Test-Path "$env:RUNNER_TEMP\vcpkg") {
            Remove-Item -Recurse -Force "$env:RUNNER_TEMP\vcpkg"
          }
          git clone --depth 1 --branch "$env:VCPKG_PIN" https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          $head = & git -C "$env:RUNNER_TEMP\vcpkg" rev-parse HEAD
          Write-Output "vcpkg pinned to tag $env:VCPKG_PIN (commit $head)"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install libopus via vcpkg
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install opus:x64-windows
          # Locate the produced DLL.
          $dll = "$env:RUNNER_TEMP\vcpkg\installed\x64-windows\bin\opus.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "Expected $dll after vcpkg install, but it is missing."
            exit 1
          }
          # Drop into the package _libs/ directory so the wheel build
          # picks it up via `tool.hatch.build.targets.wheel.artifacts`.
          $dest_dir = "$env:GITHUB_WORKSPACE\gateway\stackchan_mcp\_libs"
          New-Item -ItemType Directory -Force -Path $dest_dir | Out-Null
          Copy-Item -Force $dll "$dest_dir\opus.dll"

      # Confirm vcpkg actually produced opus.dll and capture its
      # SHA256 for informational logging. Functional verification
      # (load opus.dll via opuslib and run an Opus encode round-trip)
      # happens in the publish job below — see `Smoke test bundled
      # opus loader`. The byte-identical SHA256 guard was retired in
      # v0.9.1; see the job-level comment above for the rationale.
      - name: Confirm opus.dll was produced
        shell: pwsh
        run: |
          $dll = "$env:GITHUB_WORKSPACE\gateway\stackchan_mcp\_libs\opus.dll"
          if (-not (Test-Path $dll)) {
            Write-Output "::error::opus.dll was not produced by vcpkg install. Expected at $dll."
            exit 1
          }
          $actual = (Get-FileHash $dll -Algorithm SHA256).Hash.ToLower()
          Write-Output "opus.dll SHA256 (informational, not used as publish gate): $actual"
          # Expose for any downstream step (e.g. release notes) that
          # may want to surface the captured hash.
          "OPUS_DLL_SHA256=$actual" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      # `--extra tts` pulls in `opuslib`, which the smoke test below
      # imports. Without it, the smoke step fails with
      # `ModuleNotFoundError: No module named 'opuslib'` — a
      # release-only failure mode that the PR build (`build.yml`)
      # would not catch, since PR CI already installs the `tts`
      # extra explicitly.
      - name: Install gateway dependencies (with tts extra)
        working-directory: gateway
        run: uv sync --frozen --extra tts

      # Smoke test the loader paths on the actual platform that ships
      # the DLL. This catches obvious mistakes (missing `_libs/`
      # directory, wrong filename, broken `add_dll_directory`
      # registration) before the wheel leaves CI.
      - name: Smoke test bundled opus loader
        working-directory: gateway
        shell: pwsh
        run: |
          uv run python -c "import stackchan_mcp, pathlib; p = pathlib.Path(stackchan_mcp.__file__).parent / '_libs' / 'opus.dll'; assert p.is_file(), f'missing {p}'; print(f'opus.dll size: {p.stat().st_size}')"
          uv run python -c "import stackchan_mcp; import opuslib; enc = opuslib.Encoder(48000, 1, opuslib.APPLICATION_VOIP); _ = enc.encode(b'\x00' * 960 * 2, 960); print('opus encode round-trip: OK')"

      - name: Build wheel (win_amd64)
        working-directory: gateway
        shell: pwsh
        # `uv build --wheel` produces a `*-py3-none-any.whl` by
        # default; rewrite the wheel's platform tag to `win_amd64` via
        # the `wheel tags` CLI so both the filename and the internal
        # `.dist-info/WHEEL` `Tag:` line say `win_amd64`. The earlier
        # filename-only rename (introduced in PR #217) produced a
        # wheel whose filename and internal metadata disagreed —
        # wheel-validating tools would flag this as a malformed
        # distribution. Codex review of v0.9.1 caught the
        # inconsistency; this commit fixes it as part of the
        # Windows wheel restore.
        run: |
          uv build --wheel
          # `wheel` is not a runtime dependency of stackchan-mcp; it
          # is installed explicitly into the project env here so that
          # `uv run python -m wheel tags ...` is available regardless
          # of resolver caching behavior between runs.
          uv pip install wheel
          $wheels = Get-ChildItem dist\*-py3-none-any.whl
          if ($wheels.Count -ne 1) {
            Write-Error "Expected exactly one py3-none-any wheel, found $($wheels.Count)"
            exit 1
          }
          $src = $wheels[0].FullName
          # Rewrite the wheel's platform tag in-place; `--remove`
          # deletes the source `py3-none-any` wheel so only the
          # `win_amd64` wheel remains in dist/.
          uv run python -m wheel tags --platform-tag win_amd64 --remove $src
          # Sanity check the produced wheel: exactly one win_amd64
          # wheel and no leftover py3-none-any wheel should be in
          # dist/ at this point.
          $built = Get-ChildItem dist\*-win_amd64.whl
          if ($built.Count -ne 1) {
            Write-Error "Expected exactly one win_amd64 wheel after `wheel tags`, found $($built.Count)"
            exit 1
          }
          $stale = Get-ChildItem dist\*-py3-none-any.whl -ErrorAction SilentlyContinue
          if ($stale -ne $null -and $stale.Count -gt 0) {
            Write-Error "Stale py3-none-any wheel still present after `wheel tags --remove`: $($stale -join ', ')"
            exit 1
          }
          Get-ChildItem dist\

      - name: Upload Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-windows
          path: gateway/dist/*-win_amd64.whl
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: [build, build-windows-wheel]
    # Only publish on tag pushes. workflow_dispatch invocations stop at
    # the build job above, so manual runs cannot release. The
    # `startsWith(github.ref, 'refs/tags/v')` guard makes the intent
    # explicit and survives future trigger additions (e.g. push to
    # branches).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    # Trusted Publishing — short-lived OIDC token, no API secret needed.
    # The `pypi` environment must be configured on GitHub (Settings ->
    # Environments) and the project must be registered as a Trusted
    # Publisher on PyPI before this job can succeed.
    environment:
      name: pypi
      url: https://pypi.org/p/stackchan-mcp

    permissions:
      id-token: write

    steps:
      - name: Download Linux distributions (sdist + py3-none-any wheel)
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions-linux
          path: dist/

      - name: Download Windows wheel (win_amd64)
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions-windows
          path: dist/

      - name: List artifacts to publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
